services:
  gateway:
    image: caddy:2.10-alpine
    container_name: nexus-mail-gateway
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./deployments/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - app

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: nexus-mail-api
    env_file:
      - .env
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "0.0.0.0:8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - app

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: nexus-mail-worker
    env_file:
      - .env
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pidof worker >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - app

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile.scheduler
    container_name: nexus-mail-scheduler
    env_file:
      - .env
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pidof scheduler >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - app

  webhook-worker:
    build:
      context: .
      dockerfile: Dockerfile.scheduler
    container_name: nexus-mail-webhook-worker
    env_file:
      - .env
    command: ["/app/scheduler", "webhook-worker"]
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pidof scheduler >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - app

  mail-ingest:
    build:
      context: .
      dockerfile: Dockerfile.mail-ingest
    container_name: nexus-mail-mail-ingest
    env_file:
      - .env
    depends_on:
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
    ports:
      - "2525:2525"
    volumes:
      - mail_ingest_spool:${MAIL_INGEST_SPOOL_DIR:-/var/spool/nexus-mail-ingest}
    healthcheck:
      test: ["CMD-SHELL", "pidof mail-ingest >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - app

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: nexus-mail-web
    env_file:
      - .env
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "0.0.0.0:5173:5173"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5173"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - app

  postgres:
    image: postgres:16-alpine
    container_name: nexus-mail-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deployments/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - app

  pgbouncer:
    image: edoburu/pgbouncer:v1.24.1-p1
    container_name: nexus-mail-pgbouncer
    environment:
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_HOST: postgres
      DB_NAME: ${POSTGRES_DB}
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 1000
      DEFAULT_POOL_SIZE: 50
      RESERVE_POOL_SIZE: 20
      AUTH_TYPE: plain
    ports:
      - "127.0.0.1:6432:5432"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pidof pgbouncer >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - app

  redis:
    image: redis:7-alpine
    container_name: nexus-mail-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - app

  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: nexus-mail-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - app

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: nexus-mail-minio
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "test", "-d", "/proc/1"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - app

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
  redis_data:
  rabbitmq_data:
  minio_data:
  mail_ingest_spool:

networks:
  app:
    driver: bridge
