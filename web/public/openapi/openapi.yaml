openapi: 3.0.3
info:
  title: Nexus-Mail API
  version: 0.5.0
  description: |
    Nexus-Mail 当前对外接口文档（Phase 5 初始版）。
    覆盖身份认证、项目/订单、供应商资源、钱包与结算相关主链路。
servers:
  - url: /api/v1
    description: 当前前后端统一反向代理入口
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    TokenPair:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        expires_in:
          type: integer
    Project:
      type: object
      properties:
        id:
          type: integer
        key:
          type: string
        name:
          type: string
        default_price:
          type: integer
        success_rate:
          type: number
          format: float
        timeout_seconds:
          type: integer
    ActivationOrder:
      type: object
      properties:
        id:
          type: integer
        project_key:
          type: string
        mailbox_address:
          type: string
        status:
          type: string
        quoted_price:
          type: integer
        final_price:
          type: integer
        extraction_type:
          type: string
        extraction_value:
          type: string
        expires_at:
          type: string
          format: date-time
    CreateActivationOrderRequest:
      type: object
      required: [project_key]
      properties:
        project_key:
          type: string
        preferred_country:
          type: string
    WalletOverview:
      type: object
      properties:
        user_id:
          type: integer
        email:
          type: string
        available_balance:
          type: integer
        frozen_balance:
          type: integer
        pending_settlement:
          type: integer
        updated_at:
          type: string
          format: date-time
    WalletTransaction:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        order_id:
          type: integer
        type:
          type: string
        direction:
          type: string
        amount:
          type: integer
        balance_type:
          type: string
        note:
          type: string
        created_at:
          type: string
          format: date-time
    ProviderAccountRequest:
      type: object
      required: [provider, auth_mode, protocol_mode, identifier]
      properties:
        provider:
          type: string
        source_type:
          type: string
        auth_mode:
          type: string
          enum: [oauth2, authorization_code, app_password, password, bridge_local_credential]
        protocol_mode:
          type: string
          enum: [imap_pull, pop3_pull]
        identifier:
          type: string
        host:
          type: string
        port:
          type: integer
        refresh_token:
          type: string
        credential_secret:
          type: string
        secret_ref:
          type: string
          description: 仅支持 env://VAR_NAME
        bridge_endpoint:
          type: string
        bridge_label:
          type: string
    TopUpRequest:
      type: object
      required: [amount]
      properties:
        amount:
          type: integer
        note:
          type: string
    AdminWalletAdjustmentRequest:
      type: object
      required: [user_id, amount, reason]
      properties:
        user_id:
          type: integer
        amount:
          type: integer
        reason:
          type: string
    SettleSupplierPendingRequest:
      type: object
      required: [supplier_id, reason]
      properties:
        supplier_id:
          type: integer
        reason:
          type: string
    SupplierSettlementPayout:
      type: object
      properties:
        supplier_id:
          type: integer
        settled_amount:
          type: integer
        pending_balance:
          type: integer
        settled_balance:
          type: integer
        entry_count:
          type: integer
        reason:
          type: string
        settled_at:
          type: string
          format: date-time
    APIKey:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        name:
          type: string
        key_preview:
          type: string
        scopes:
          type: array
          items:
            type: string
        whitelist:
          type: array
          items:
            type: string
        status:
          type: string
        last_used_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    UpdateAPIKeyWhitelistRequest:
      type: object
      required: [whitelist]
      properties:
        whitelist:
          type: array
          maxItems: 64
          description: IP 或 CIDR 白名单；空数组表示不限制来源 IP。
          items:
            type: string
            example: 172.18.0.1
    RiskRule:
      type: object
      required: [key, enabled, threshold, window_minutes, severity]
      properties:
        key:
          type: string
          enum: [high_cancel, high_timeout, api_denied_rate, sender_blacklist]
        enabled:
          type: boolean
        threshold:
          type: integer
          minimum: 1
        window_minutes:
          type: integer
          minimum: 1
          maximum: 1440
        severity:
          type: string
          enum: [high, medium, low]
        description:
          type: string
        updated_at:
          type: string
          format: date-time
    AdminDashboardSummary:
      type: object
      properties:
        users:
          type: object
          properties:
            total:
              type: integer
        orders:
          type: object
          properties:
            total:
              type: integer
            waiting_email:
              type: integer
            ready:
              type: integer
            finished:
              type: integer
            canceled:
              type: integer
            timeout:
              type: integer
            completion_rate_bps:
              type: integer
              description: 完成订单数 / 总订单数，单位 bps（10000 = 100%）。
            timeout_rate_bps:
              type: integer
              description: 超时订单数 / 总订单数，单位 bps。
            cancel_rate_bps:
              type: integer
              description: 取消订单数 / 总订单数，单位 bps。
            gross_revenue:
              type: integer
              description: 已完成订单 final_price 合计，单位分。
            average_finished_order_value:
              type: integer
              description: 已完成订单平均 final_price，单位分。
        disputes:
          type: object
          properties:
            total:
              type: integer
            open:
              type: integer
            resolved:
              type: integer
            rejected:
              type: integer
            dispute_rate_bps:
              type: integer
              description: 争议单数量 / 总订单数，单位 bps。
        projects:
          type: object
          properties:
            total:
              type: integer
            active:
              type: integer
            inactive:
              type: integer
        suppliers:
          type: object
          properties:
            total:
              type: integer
        audit:
          type: object
          properties:
            total:
              type: integer
            create:
              type: integer
            revoke:
              type: integer
            success:
              type: integer
            denied_invalid:
              type: integer
            denied_scope:
              type: integer
            denied_whitelist:
              type: integer
            denied_rate_limit:
              type: integer
            denied_total:
              type: integer
            denied_rate_bps:
              type: integer
              description: 最近审计样本中的鉴权拒绝事件占比，单位 bps。
        supplier_settlements:
          type: object
          properties:
            pending_amount:
              type: integer
    AdminAuditEntry:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        api_key_id:
          type: integer
        action:
          type: string
          enum:
            - create
            - update_whitelist
            - update_risk_rule
            - admin_wallet_adjustment
            - update_supplier_cost_profile
            - resolve_dispute
            - revoke
            - success
            - denied_invalid
            - denied_scope
            - denied_whitelist
            - denied_rate_limit
        actor_type:
          type: string
        note:
          type: string
        created_at:
          type: string
          format: date-time
    AdminOverviewResponse:
      type: object
      properties:
        generated_at:
          type: string
          format: date-time
        summary:
          $ref: '#/components/schemas/AdminDashboardSummary'
        recent_audit:
          type: array
          items:
            $ref: '#/components/schemas/AdminAuditEntry'
    WebhookDelivery:
      type: object
      properties:
        id:
          type: integer
        endpoint_id:
          type: integer
        user_id:
          type: integer
        event_type:
          type: string
        payload:
          type: string
          description: JSON 字符串形式的投递载荷快照。
        status:
          type: string
          enum: [pending, sent, failed]
        attempt_count:
          type: integer
        next_attempt_at:
          type: string
          format: date-time
        locked_at:
          type: string
          format: date-time
          nullable: true
        locked_by:
          type: string
        expires_at:
          type: string
          format: date-time
        last_error:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    UpdateRiskRulesRequest:
      type: object
      required: [items]
      properties:
        items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/RiskRule'
security:
  - bearerAuth: []
paths:
  /auth/login:
    post:
      summary: 用户登录
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    $ref: '#/components/schemas/TokenPair'
        '401':
          description: 登录失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/refresh:
    post:
      summary: 刷新访问令牌
      security: []
      responses:
        '200':
          description: 刷新成功
  /auth/me:
    get:
      summary: 获取当前用户
      responses:
        '200':
          description: 当前用户资料
  /auth/api-keys/{id}/whitelist:
    patch:
      summary: 更新当前用户 API Key 的 IP 白名单
      description: |
        仅可更新当前用户自己名下且处于 active 状态的 API Key。
        whitelist 支持 IP 或 CIDR，最多 64 条；空数组表示不限制来源 IP。
        更新动作会写入 update_whitelist 审计日志，可由管理员审计接口筛选。
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAPIKeyWhitelistRequest'
      responses:
        '200':
          description: 白名单已更新
          content:
            application/json:
              schema:
                type: object
                properties:
                  api_key:
                    $ref: '#/components/schemas/APIKey'
        '400':
          description: 参数无效、白名单非法或 API Key 不存在/已撤销
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 缺少或无效的用户认证令牌
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /projects:
    get:
      summary: 获取项目列表
      responses:
        '200':
          description: 项目列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Project'
  /projects/inventory:
    get:
      summary: 获取库存与供应情况
      responses:
        '200':
          description: 库存列表
  /orders/activations:
    get:
      summary: 获取当前用户激活订单
      responses:
        '200':
          description: 订单列表
    post:
      summary: 创建激活订单
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateActivationOrderRequest'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  order:
                    $ref: '#/components/schemas/ActivationOrder'
  /orders/activations/{id}:
    get:
      summary: 获取激活订单详情
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 订单详情
    post:
      deprecated: true
      summary: 占位
  /orders/activations/{id}/result:
    get:
      summary: 获取提取结果
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 提取状态与结果
  /orders/activations/{id}/cancel:
    post:
      summary: 取消订单并触发退款/释放冻结余额
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 已取消
  /orders/activations/{id}/finish:
    post:
      summary: 手动完结订单
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 已完结
  /supplier/resources/accounts:
    post:
      summary: 创建供应商邮箱账号资源
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProviderAccountRequest'
      responses:
        '201':
          description: 创建成功
        '400':
          description: 校验失败（如非官方端点、secret_ref 非 env://）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /supplier/resources/overview:
    get:
      summary: 查看供应商资源总览
      responses:
        '200':
          description: 总览成功
  /wallet/overview:
    get:
      summary: 获取用户钱包总览
      responses:
        '200':
          description: 钱包概览
          content:
            application/json:
              schema:
                type: object
                properties:
                  wallet:
                    $ref: '#/components/schemas/WalletOverview'
  /wallet/transactions:
    get:
      summary: 获取钱包流水
      responses:
        '200':
          description: 流水列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/WalletTransaction'
  /wallet/topups:
    post:
      summary: 开发环境模拟充值
      description: 非 development 环境应由后续真实充值链路替换
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TopUpRequest'
      responses:
        '200':
          description: 充值成功
        '403':
          description: 当前环境禁用
  /supplier/settlements:
    get:
      summary: 获取供应商待结算总览与结算流水
      responses:
        '200':
          description: 供应商结算总览
  /supplier/cost-profiles:
    get:
      summary: 获取当前供应商成本模型列表
      responses:
        '200':
          description: 成本模型列表
    post:
      summary: 新增或更新当前供应商项目成本模型
      description: 仅供应商角色可维护自己的成本模型；project_key 最长 64 字符，cost_per_success/cost_per_timeout 必须非负，currency 为空时默认 CNY 且必须为 3 位币种代码，status 仅支持 active/inactive；inactive 成本模型会保留但不参与供应商报表 modeled_cost 计算。更新动作会写入 update_supplier_cost_profile 审计，管理员可通过 /admin/audit?action=update_supplier_cost_profile 查询。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [project_key, cost_per_success, cost_per_timeout]
              properties:
                project_key:
                  type: string
                  maxLength: 64
                cost_per_success:
                  type: integer
                  minimum: 0
                cost_per_timeout:
                  type: integer
                  minimum: 0
                currency:
                  type: string
                  minLength: 3
                  maxLength: 3
                  default: CNY
                status:
                  type: string
                  enum: [active, inactive]
                  default: active
                notes:
                  type: string
                  maxLength: 500
      responses:
        '200':
          description: 成本模型已保存
        '400':
          description: project_key 无效或超过 64 字符、成本为负、currency 非 3 位币种代码、status 非 active/inactive、notes 超过 500 字符或请求参数无效
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /supplier/reports:
    get:
      summary: 获取当前供应商项目级订单/收入/成本报表
      parameters:
        - in: query
          name: from
          required: false
          schema:
            type: string
            format: date
          description: 按订单创建日期过滤，起始日期（YYYY-MM-DD，含当天）。
        - in: query
          name: to
          required: false
          schema:
            type: string
            format: date
          description: 按订单创建日期过滤，结束日期（YYYY-MM-DD，含当天）。
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 100
          description: 返回项目数量上限，服务端最大 200。
      responses:
        '200':
          description: 项目报表列表
        '400':
          description: 日期格式无效或 from 晚于 to
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /supplier/disputes:
    get:
      summary: 获取当前供应商相关争议单
      responses:
        '200':
          description: 争议单列表
  /supplier/disputes/{orderID}:
    post:
      summary: 供应商对订单发起争议
      parameters:
        - in: path
          name: orderID
          required: true
          schema:
            type: integer
      responses:
        '201':
          description: 争议单已创建
  /webhooks/endpoints:
    get:
      summary: 获取当前用户 Webhook endpoint 列表
      responses:
        '200':
          description: Endpoint 列表；仅返回 secret_preview，不返回签名 secret 明文。
    post:
      summary: 创建 Webhook endpoint
      description: 创建时生成一次性 signing_secret；URL 会进行 scheme、host 与 DNS 解析层 SSRF 拦截。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url, events]
              properties:
                url:
                  type: string
                  format: uri
                events:
                  type: array
                  items:
                    type: string
      responses:
        '201':
          description: 创建成功，响应包含一次性 signing_secret。
        '400':
          description: 参数无效或 URL 不安全
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /webhooks/endpoints/{id}/deliveries:
    get:
      summary: 获取指定 Webhook endpoint 的最近投递记录
      description: 仅可查询当前用户自己 endpoint 下的最近投递/重试状态，按创建时间倒序返回，当前最多 50 条。
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 投递记录列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/WebhookDelivery'
        '404':
          description: Endpoint 不存在或不属于当前用户
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /webhooks/endpoints/{id}/test-delivery:
    post:
      summary: 创建一条 Webhook 测试投递记录
      description: 创建测试投递记录并由 Webhook delivery worker 异步真实发送；worker 会携带 HMAC-SHA256 签名请求头，2xx 标记 sent，非 2xx/网络错误按指数退避重试，达到最大尝试次数后标记 failed。
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '202':
          description: 测试投递记录已创建
          content:
            application/json:
              schema:
                type: object
                properties:
                  delivery:
                    $ref: '#/components/schemas/WebhookDelivery'
        '404':
          description: Endpoint 不存在或不属于当前用户
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/overview:
    get:
      summary: 获取管理员运营仪表盘深度统计
      description: 返回管理员 overview 聚合数据，包括订单率、流水、争议率、API Key 鉴权拒绝率以及最近审计事件。
      responses:
        '200':
          description: 管理员仪表盘统计
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminOverviewResponse'
        '401':
          description: 缺少或无效的用户认证令牌
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: 非管理员无权访问
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/wallet-users:
    get:
      summary: 管理员查看钱包用户列表
      responses:
        '200':
          description: 用户列表
  /admin/wallet-adjustments:
    post:
      summary: 管理员执行钱包调账
      description: 调账成功后写入 admin_wallet_adjustment 审计，管理员可通过 /admin/audit?action=admin_wallet_adjustment 查询。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminWalletAdjustmentRequest'
      responses:
        '200':
          description: 调账成功
        '400':
          description: 调账失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/supplier-settlements:
    post:
      summary: 管理员确认供应商待结算款
      description: 将指定供应商的 pending 结算流水原子标记为 settled，并把 supplier_settlement_ledger.pending_amount 迁移到 settled_amount；若账本金额与 pending 流水合计不一致会拒绝处理。成功后写入 settle_supplier_pending 审计，管理员可通过 /admin/audit?action=settle_supplier_pending 查询。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SettleSupplierPendingRequest'
      responses:
        '200':
          description: 结算确认成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  payout:
                    $ref: '#/components/schemas/SupplierSettlementPayout'
        '400':
          description: supplier_id 无效、暂无待结算金额或账本/流水不一致
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /wallet/disputes/{orderID}:
    post:
      summary: 用户对自己的订单发起争议
      parameters:
        - in: path
          name: orderID
          required: true
          schema:
            type: integer
      responses:
        '201':
          description: 争议单已创建
  /admin/disputes:
    get:
      summary: 管理员查看全部争议单
      responses:
        '200':
          description: 争议单列表
  /admin/disputes/{id}/resolve:
    post:
      summary: 管理员处理争议单
      description: 处理动作会写入 resolve_dispute 审计；refund_amount 大于 0 时必须使用 resolution_type=refund。
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 争议单已处理
        '400':
          description: 请求无效或退款契约不满足
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/audit:
    get:
      summary: 管理员审计日志查询
      description: 支持按 action、actor_type、user_id、api_key_id 与 limit 过滤；action 覆盖 API Key 生命周期、鉴权拒绝、风控规则更新以及 Phase 4 财务运营动作（admin_wallet_adjustment、update_supplier_cost_profile、settle_supplier_pending、resolve_dispute）。
      parameters:
        - in: query
          name: action
          schema:
            type: string
        - in: query
          name: actor_type
          schema:
            type: string
            enum: [user, system, admin]
        - in: query
          name: user_id
          schema:
            type: integer
        - in: query
          name: api_key_id
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
            maximum: 200
      responses:
        '200':
          description: 审计日志列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/AdminAuditEntry'
        '400':
          description: 过滤条件不受支持
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/risk:
    get:
      summary: 获取管理员风控信号汇总
      responses:
        '200':
          description: 风控汇总与风险信号
  /admin/risk/rules:
    get:
      summary: 获取可配置风控规则
      responses:
        '200':
          description: 风控规则列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/RiskRule'
    put:
      summary: 更新可配置风控规则
      description: 管理员更新规则启用状态、阈值、窗口与等级；每条更新写入 update_risk_rule 审计。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRiskRulesRequest'
      responses:
        '200':
          description: 已保存规则
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/RiskRule'
        '400':
          description: 参数无效
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
